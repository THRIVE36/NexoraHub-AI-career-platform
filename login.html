<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Nexora</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Nexora</h1>
  <p>Login to your account</p>
</header>

<section>
  <div class="card" style="max-width:400px; margin:auto;">
    
    <h2>Login</h2>

    <input type="email" id="loginEmail" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;">
    
    <input type="password" id="loginPassword" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;">

    <button class="btn" onclick="loginUser()">Login</button>

    <p style="margin-top:10px;">
      Don't have an account? <a href="signup.html">Sign up</a>
    </p>

  </div>
</section>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBGNI_zvB9DGSZP3qOUsd-QR9_XQaNmFR0",
authDomain: "eazzihub.firebaseapp.com",
projectId: "eazzihub",
storageBucket: "eazzihub.firebasestorage.app",
messagingSenderId: "593581035509",
appId: "1:593581035509:web:a7f59ad9d58056d2631abc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
window.loginUser = async function () {

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    if (!email || !password) {
        alert("Please enter your email and password.");
        return;
    }

    try {
        await signInWithEmailAndPassword(auth, email, password);

        alert("Login Successful!");

        window.location.href = "dashboard.html";

    } catch (error) {
        alert(error.message);
    }

};
</script>
<script src="script.js"></script>
</body>
</html>
