<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Eazzi Inc</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Eazzi Inc</h1>
  <p>Create your account</p>
</header>

<section>
  <div class="card" style="max-width:400px; margin:auto;">
    
    <h2>Sign Up</h2>

    <input type="text" id="signupName" placeholder="Full Name" style="width:100%;padding:10px;margin:10px 0;">

    <input type="email" id="signupEmail" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;">

    <input type="password" id="signupPassword" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;">

    <button class="btn" onclick="signupUser()">Create Account</button>

    <p style="margin-top:10px;">
      Already have an account? <a href="login.html">Login</a>
    </p>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>
